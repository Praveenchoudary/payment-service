version: "3.8"

services:
  payment-service:
    build: ./payment-service
    ports:
      - "8081:8080"

  booking-service:
    build: ./booking-service
    ports:
      - "8082:8080"
    environment:
      - PAYMENT_SERVICE_URL=http://payment-service:8080
    depends_on:
      - payment-service

  ui-service:
    build: ./ui-service
    ports:
      - "8083:8080"
    environment:
      - BOOKING_SERVICE_URL=http://booking-service:8080
    depends_on:
      - booking-service
